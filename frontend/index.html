<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Journal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Daily Journal</h1>
            <div class="header-right">
                <div id="ai-status" class="ai-status ai-status--checking">
                    <span class="ai-status__dot"></span>
                    <span class="ai-status__label">Checking AI...</span>
                </div>
                <input type="date" id="date-picker">
            </div>
        </div>
    </header>

    <div class="container">
        <main class="main-column">
            <div class="entry-form">
                <div class="entry-input-row">
                    <input type="text" id="entry-input" placeholder="Type your entry..." autocomplete="off">
                    <button id="submit-btn">Submit</button>
                </div>
                <div class="category-radios">
                    <label><input type="radio" name="category" value="work" checked> Work</label>
                    <label><input type="radio" name="category" value="personal"> Personal</label>
                    <label><input type="radio" name="category" value="finance"> Finance</label>
                </div>
            </div>

            <div class="entries-section">
                <h2>Today's Entries</h2>
                <div id="entries-list"></div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="glance-card">
                <h3>Upcoming Todos</h3>
                <div id="events-list">
                    <p class="empty-state">No upcoming todos</p>
                </div>
            </div>
        </aside>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
